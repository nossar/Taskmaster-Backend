services:
  - type: web
    plan: free
    name: taskmaster-backend
    runtime: python
    repo: https://github.com/nossar/Taskmaster-Backend.git
    buildCommand: "uv sync && uv run manage.py collectstatic --noinput && uv run manage.py migrate"
    startCommand: "uv run gunicorn taskmaster_backend.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "[\"taskmaster-backend-2p03.onrender.com\"]"
      - key: DATABASE_URL
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
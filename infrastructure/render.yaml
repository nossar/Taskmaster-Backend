services:
  - type: web
    plan: free
    name: taskmaster-backend
    runtime: python
    repo: https://https://github.com/nossar/Taskmaster-Backend.git
    buildCommand: "uv sync && uv run manage.py collectstatic --noinput && uv run manage.py migrate"
    startCommand: "uv run gunicorn trab2_web.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "[\"taskmaster-backend.onrender.com\"]"
      - key: DATABASE_URL
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false